version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: resource_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: resource_admin
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./admin-backend
    container_name: resource_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://admin:admin123@mysql:3306/resource_admin
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      PORT: 3001
      WECOM_API_BASE: https://qyapi.weixin.qq.com
    ports:
      - "3001:3001"

  frontend:
    build: ./admin-frontend
    container_name: resource_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

  nginx:
    image: nginx:alpine
    container_name: resource_nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  mysql_data:
